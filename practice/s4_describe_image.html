<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>MacBook Neo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
  <!-- Header Navigation -->
  <header class="flex items-center justify-between px-6 py-4 border-b border-gray-200">
    <h1 class="text-2xl font-semibold">MacBook Neo</h1>
    <nav class="flex gap-8 text-sm">
      <a href="#" class="hover:text-gray-600 hover:border-b-2 border-blue-500">Overview</a>
      <a href="#" class="hover:text-gray-600 hover:border-b-2 border-blue-500">Tech Specs</a>
      <a href="#" class="hover:text-gray-600 hover:border-b-2 border-blue-500">Compare</a>
      <a href="#" class="hover:text-gray-600 hover:border-b-2 border-blue-500">Switch from PC to Mac</a>
    </nav>
    <a href="#" class="bg-blue-500 text-white px-4 py-2 rounded">Pre-order</a>
  </header>

  <!-- Hero Section with MacBook Image -->
  <section>
    <div class="p-6 flex justify-center">
      <img src="https://www.apple.com/v/macbook-neo/a/images/specs/hero__cp2jyjh3uumq_large_2x.jpg" alt="MacBook Neo">
    </div>
  </section>

  <!-- Finish Section -->
  <section class="py-12 border-t border-gray-200">
    <h2 class="text-3xl font-semibold mb-8 px-6">Finish</h2>
    <div class="px-6 mb-8">
      <img src="https://www.apple.com/v/macbook-neo/a/images/specs/finish__czy7cev7ongy_large_2x.jpg" alt="MacBook Neo finishes" class="w-full">
      <div class="flex justify-evenly">
        <p class="text-base">Silver</p>
        <p class="text-base">Blush</p>
        <p class="text-base">Citrus</p>
        <p class="text-base">Indigo</p>
      </div>
    </div>
  </section>
</body>
</html>
